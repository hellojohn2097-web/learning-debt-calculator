    <!-- Styles -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fafafa;
        }
        h1, h2, h3, .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .gradient-text {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #fbbf24;
            outline: none;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        .progress-bar {
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
            transition: width 1s ease-out;
        }
        .debt-pulse {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
        }
        .slide-in {
            animation: slideIn 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .category-card {
            transition: all 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-2px);
            border-color: rgba(251, 191, 36, 0.5);
        }
        .result-highlight {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
            border-left: 4px solid #fbbf24;
        }
    </style>
</head>

                    b.classList.remove('bg-amber-500/20', 'border-amber-500', 'text-amber-400');
                    b.classList.add('border-white/10');
                });
                e.target.classList.remove('border-white/10');
                e.target.classList.add('bg-amber-500/20', 'border-amber-500', 'text-amber-400');

        function shareResults() {
            const debt = document.getElementById('totalDebt').textContent;
            const text = `I just calculated my Learning Debt: ${debt}. Turns out I've been investing in knowledge but not implementation. Time to fix that. Calculate yours:`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'My Learning Debt',
                    text: text,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                alert('Results copied to clipboard!');
            }
        }
