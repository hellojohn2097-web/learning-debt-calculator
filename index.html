<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learning Debt Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .box {
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Learning Debt Calculator</h1>
    <p>See how much confusion is costing you.</p>

    <label>Hours lost per week</label>
    <input id="hours" type="number" value="2" />

    <label>Value per hour</label>
    <input id="rate" type="number" value="250" />

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      const hours = document.getElementById("hours").value;
      const rate = document.getElementById("rate").value;
      const weekly = hours * rate;
      const yearly = weekly * 52;

      document.getElementById("result").innerText =
        "Weekly cost: " + weekly + " | Yearly cost: " + yearly;
    }
  </script>
</body>
</html>
