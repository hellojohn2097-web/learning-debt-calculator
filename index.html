<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learning Debt Calculator | Thriveline Circle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111111, #1c1c1c);
      color: #ffffff;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .brand span {
      color: #e53935;
    }

    .card {
      background: #ffffff;
      color: #111111;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 22px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #e53935;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #c62828;
    }

    .result {
      margin-top: 20px;
      font-size: 15px;
      font-weight: bold;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      text-align: center;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="brand">
      <h1><span>THRIVELINE</span> CIRCLE</h1>
      <p>Unifying systems that drive growth</p>
    </div>

    <div class="card">
      <h2>Learning Debt Calculator</h2>
      <p>See the real cost of confusion, rework, and slow execution.</p>

      <label>Hours lost per week</label>
      <input id="hours" type="number" value="2" />

      <label>Value per hour</label>
      <input id="rate" type="number" value="250" />

      <button onclick="calculate()">Calculate my learning debt</button>

      <div class="result" id="result"></div>
    </div>

    <div class="footer">
      © Thriveline Circle
    </div>

  </div>

  <script>
    function calculate() {
      const hours = Number(document.getElementById("hours").value);
      const rate = Number(document.getElementById("rate").value);

      const weekly = hours * rate;
      const yearly = weekly * 52;

      document.getElementById("result").innerText =
        "This confusion is costing you " +
        weekly +
        " per week — " +
        yearly +
        " per year.";
    }
  </script>
</body>
</html>
